$kind: collection
name: Well-Being Web App (Sit-With-PD)
description: >-
  Complete API collection for the Well-Being Web Platform. 


  **Setup:**

  1. Set the `baseUrl` variable to your server (default: http://localhost:5000)

  2. Run **Register** or **Login** first — the token auto-saves to `authToken`

  3. All protected routes automatically use the saved token via collection-level
  auth

  4. **Blog:** Every blog endpoint is under **📝 Blog**. **Create** / **Create
  (Draft)** save `blogPostId` and `blogSlug`. **Update** (minimal or full
  fields), **Delete**, and **Get by ID (admin)** use `blogPostId`; public **Get
  by Slug** uses `blogSlug`. Two public list requests cover unfiltered and
  `?category=` filters.

  5. **Admin list GETs** use `?page=&limit=` (see each request). Typical
  response: `data` array + `meta` { total, page, limit, totalPages }.


  **Seeded Admin:**

  - Email: admin@wellbeing.com

  - Password: Admin@1234
variables:
  baseUrl: http://localhost:5000
  authToken: ""
  programId: ""
  lessonId: ""
  campId: ""
  campRegistrationId: ""
  campTierId: ""
  campImageId: ""
  testimonialId: ""
  serviceId: ""
  consultationId: ""
  paymentRef: ""
  userId: ""
  verifyToken: ""
  blogPostId: ""
  blogSlug: learning-to-sit-with-your-emotions
auth:
  - id: dac7afaa-8070-4ca9-a6b3-28e514895b54
    type: bearer
    name: bearer auth
    credentials:
      token: "{{authToken}}"
