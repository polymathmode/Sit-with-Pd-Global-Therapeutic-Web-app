$kind: http-request
description: >-
  Admin only. Always paginated (`page`, `limit`; defaults 1 and 20, limit max
  100). Response includes `meta` { total, page, limit, totalPages }. Optional
  filters: `status` (all | draft | published), `category`, `search` or `q`.
  Bearer token after **Login** (e.g. admin@wellbeing.com).
url: "{{baseUrl}}/api/admin/blog"
method: GET
auth:
  type: noauth
headers:
  Authorization: Bearer {{authToken}}
order: 3000
