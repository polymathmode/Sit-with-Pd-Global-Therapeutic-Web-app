$kind: http-request
description: >-
  Admin only. Example `PATCH` with **title**, **excerpt**, **body**, and
  **slug** set to non-empty values (required for partial updates — do not send
  empty strings). Run after **Create Blog Post** so `blogPostId` is set. Adjust
  `slug` if you get 409 (slug already exists).
url: "{{baseUrl}}/api/admin/blog/{{blogPostId}}"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Learning to Sit With Your Emotions (updated title)
    - type: text
      key: excerpt
      value: Updated excerpt — still about sitting with emotions without rushing to fix them.
    - type: text
      key: body
      value: "## Updated\n\nNew content for the article body. Tables, links, etc."
    - type: text
      key: slug
      value: learning-to-sit-with-your-emotions
    - type: text
      key: category
      value: WELLBEING
    - type: text
      key: readTimeMinutes
      value: "8"
    - type: text
      key: isPublished
      value: "true"
    - type: file
      key: coverImage
      src:
        - ""
      description: Optional
order: 6500
