$kind: http-request
description: >-
  Admin only. Fetches a single post by id (draft or published). Set
  `blogPostId` from **Create Blog Post** or paste an id from **List All Blog
  Posts**.
url: "{{baseUrl}}/api/admin/blog/{{blogPostId}}"
method: GET
auth:
  type: noauth
headers:
  Authorization: Bearer {{authToken}}
order: 4000
