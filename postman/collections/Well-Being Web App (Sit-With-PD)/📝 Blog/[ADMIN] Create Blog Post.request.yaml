$kind: http-request
description: >-
  Admin only. `multipart/form-data`. Required: `title`, `excerpt`, `body`,
  `category` (`REFLECTION` | `WELLBEING` | `PERSONAL_GROWTH`). Optional: `slug`
  (auto from title if omitted), `readTimeMinutes` (default 5), `isPublished`
  (default false), `authorId` (`users.id` CUID — leave the row **disabled** to
  omit so the server attaches the authenticated admin), **`author`** or
  **`authorDisplayName`** — public byline text (e.g. posting on behalf of someone;
  max 200 chars; `authorDisplayName` wins if both sent), `coverImage` file, or
  `coverImageUrl` as text if the image is already hosted.
url: "{{baseUrl}}/api/admin/blog"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Learning to Sit With Your Emotions
    - type: text
      key: slug
      value: learning-to-sit-with-your-emotions
      description: Optional — server normalizes; omit to derive from title
    - type: text
      key: excerpt
      value: Understanding your emotions without rushing to fix them can lead to deeper clarity and lasting growth.
    - type: text
      key: body
      value: "## Intro\n\nFull article body (markdown or HTML).\n\n- Point one\n- Point two"
    - type: text
      key: category
      value: WELLBEING
      description: REFLECTION | WELLBEING | PERSONAL_GROWTH
    - type: text
      key: readTimeMinutes
      value: "5"
    - type: text
      key: isPublished
      value: "true"
    - type: text
      key: authorId
      value: "{{userId}}"
      description: >
        Optional `users.id`. Row is **disabled** by default (field omitted →
        server uses authenticated admin). After Login, enable and keep
        `{{userId}}` to send an explicit id, or paste another user's CUID.
      disabled: true
    - type: text
      key: author
      value: Samuel O.
      description: >
        Optional byline shown to readers. Same as `authorDisplayName`; enable to test.
      disabled: true
    - type: text
      key: coverImageUrl
      value: ""
      description: Optional — use if not uploading `coverImage`
    - type: file
      key: coverImage
      src:
        - ""
      description: Optional cover image (JPG/PNG/WebP)
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('blogPostId', res.data.id);
        if (res.data.slug) {
          pm.collectionVariables.set('blogSlug', res.data.slug);
        }
        console.log('blogPostId / blogSlug saved:', res.data.id, res.data.slug);
      }
    language: text/javascript
order: 5000
