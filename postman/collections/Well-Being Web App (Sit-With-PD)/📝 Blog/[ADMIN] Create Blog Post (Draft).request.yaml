$kind: http-request
description: >-
  Same as **Create Blog Post** but `isPublished` is false. The post will appear
  in **List All Blog Posts (admin)** but not in public `GET /api/blog` or
  `GET /api/blog/:slug` until you **Update** with `isPublished: true`. Uses a
  distinct `slug` so it does not collide with the published sample.
url: "{{baseUrl}}/api/admin/blog"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Why Slowing Down Matters (draft)
    - type: text
      key: slug
      value: why-slowing-down-matters-draft
    - type: text
      key: excerpt
      value: In a fast-paced world, creating space to pause can improve clarity.
    - type: text
      key: body
      value: "## Draft\n\nContent not visible on the public blog until published."
    - type: text
      key: category
      value: PERSONAL_GROWTH
    - type: text
      key: readTimeMinutes
      value: "5"
    - type: text
      key: isPublished
      value: "false"
    - type: text
      key: coverImageUrl
      value: ""
    - type: file
      key: coverImage
      src:
        - ""
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('blogPostId', res.data.id);
        if (res.data.slug) {
          pm.collectionVariables.set('blogSlug', res.data.slug);
        }
        console.log('Draft blogPostId / blogSlug saved:', res.data.id, res.data.slug);
      }
    language: text/javascript
order: 5500
