$kind: http-request
description: >-
  Same as **Get All Blog Posts** but with `category` set. Only **published**
  posts in that category are returned. Valid values: `REFLECTION`, `WELLBEING`,
  `PERSONAL_GROWTH`. Edit the `category` query in the URL as needed.
url: "{{baseUrl}}/api/blog?category=WELLBEING"
method: GET
auth:
  type: noauth
order: 1500
