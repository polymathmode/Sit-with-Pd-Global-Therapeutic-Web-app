$kind: http-request
name: "[USER] Initialize Payment (Flutterwave) — Program"
description: |-
  Initializes a **Flutterwave** payment for a program purchase. Returns an
  `authorizationUrl` — redirect the user to this hosted checkout link.

  Use Flutterwave when the buyer's card is international and Paystack rejects
  it. Set `currency` to match the card / pricing (e.g. "USD", "GBP", "EUR").
  Default falls back to `PAYMENT_DEFAULT_CURRENCY` (NGN).

  Server requirements: `FLUTTERWAVE_SECRET_KEY` and `FLUTTERWAVE_WEBHOOK_HASH`
  must be set in env, and the dashboard webhook URL must point to
  `POST /api/payments/flutterwave-webhook` with the same secret hash.
url: "{{baseUrl}}/api/payments/initialize"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "PROGRAM",
      "itemId": "{{programId}}",
      "provider": "FLUTTERWAVE",
      "currency": "USD"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.reference) {
        pm.collectionVariables.set('paymentRef', res.data.reference);
        console.log('Flutterwave tx_ref saved:', res.data.reference);
        console.log('Redirect user to:', res.data.authorizationUrl);
      }
    language: text/javascript
order: 1500
