$kind: http-request
name: "[USER] Initialize Payment — Camp"
description: >-
  Initializes a payment for a camp application. `itemId` must be the **camp
  registration id** (from POST `/api/camps/:id/register` or GET
  `/api/camps/:id/my-registration`). Amount comes only from the tier linked to
  that registration.

  Allowed only while `isRegistrationPayable` / registration lifecycle permits
  checkout (`PENDING_PAYMENT` with a future `paymentExpiresAt`).

  **Optional body fields:**

  - `provider` — `"PAYSTACK"` (default) or `"FLUTTERWAVE"`.

  - `currency` — ISO code (e.g. `"NGN"`, `"USD"`). Defaults to
    `PAYMENT_DEFAULT_CURRENCY` (NGN).

  **400 rejection cases:**

  - **Already paid:** `You have already paid for this application.`
    (`status === CONFIRMED`, or a defensive hit when a linked payment is already
    `SUCCESS`)

  - **Hold expired / wrong lifecycle:** `This application has expired. Please
    re-apply to obtain a new payment window.` (`EXPIRED`, `CANCELLED`,
  `PENDING_PAYMENT` past `paymentExpiresAt`, etc.)

  A fresh initialize creates a new `Payment` row with `campRegistrationId` set.
  Retrying initialize while an older **PENDING** session exists detaches that
  payment (FAILED + null FK) so the unique constraint stays satisfied.

url: "{{baseUrl}}/api/payments/initialize"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "type": "CAMP",
      "itemId": "cmo9tccjc00011465auhr5f3m",
      "provider": "PAYSTACK",
      "currency": "NGN"
    }
order: 2000
