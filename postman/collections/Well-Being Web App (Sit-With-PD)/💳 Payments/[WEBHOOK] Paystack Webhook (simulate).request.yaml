$kind: http-request
description: ⚠️ For local testing only. In production, Paystack calls this
  automatically. Use Paystack CLI (paystack listen) to forward real webhook
  events to localhost.
url: "{{baseUrl}}/api/payments/webhook"
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: x-paystack-signature
    value: COMPUTED_HMAC_SHA512_SIGNATURE
    description: In production this is sent by Paystack automatically. For local
      testing use Paystack CLI.
body:
  type: text
  content: |-
    {
      "event": "charge.success",
      "data": {
        "reference": "{{paymentRef}}",
        "amount": 2500000,
        "status": "success",
        "metadata": {
          "userId": "USER_ID_HERE",
          "type": "PROGRAM",
          "itemId": "PROGRAM_ID_HERE"
        },
        "customer": {
          "email": "john@example.com"
        }
      }
    }
order: 6000
