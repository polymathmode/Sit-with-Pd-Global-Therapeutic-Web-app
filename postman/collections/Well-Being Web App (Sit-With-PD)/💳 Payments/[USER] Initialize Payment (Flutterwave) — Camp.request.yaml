$kind: http-request
name: "[USER] Initialize Payment (Flutterwave) — Camp"
description: |-
  Flutterwave variant of the camp initialize call. `itemId` is the
  **camp registration id** (same as the Paystack variant). All the same
  lifecycle / 400 rejection rules apply.

  Use a non-NGN `currency` only when the camp's pricing/cards are
  international — otherwise leave currency at "NGN" or omit it.
url: "{{baseUrl}}/api/payments/initialize"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "CAMP",
      "itemId": "{{campRegistrationId}}",
      "provider": "FLUTTERWAVE",
      "currency": "USD"
    }
order: 2500
