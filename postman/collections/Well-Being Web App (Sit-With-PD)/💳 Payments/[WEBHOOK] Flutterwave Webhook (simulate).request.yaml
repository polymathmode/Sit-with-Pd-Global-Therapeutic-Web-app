$kind: http-request
name: "[WEBHOOK] Flutterwave Webhook (simulate)"
description: |-
  ⚠️ For local testing only. In production, Flutterwave POSTs to this endpoint
  automatically when a charge completes.

  Auth: Flutterwave sends a static `verif-hash` header you set in the
  Flutterwave dashboard (Settings → Webhooks). Mirror that exact value in env
  as `FLUTTERWAVE_WEBHOOK_HASH`. Requests without a matching hash are rejected
  with 400.

  `data.tx_ref` must equal the `reference` returned by the matching initialize
  call (we store it in the `paymentRef` collection variable on success).

  The handler is idempotent — Flutterwave retries are safe.
url: "{{baseUrl}}/api/payments/flutterwave-webhook"
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: verif-hash
    value: "{{flutterwaveWebhookHash}}"
    description: Must equal FLUTTERWAVE_WEBHOOK_HASH on the server.
body:
  type: text
  content: |-
    {
      "event": "charge.completed",
      "data": {
        "id": 285959875,
        "tx_ref": "{{paymentRef}}",
        "flw_ref": "FLW-MOCK-REF",
        "amount": 25000,
        "currency": "NGN",
        "status": "successful",
        "customer": {
          "email": "john@example.com"
        },
        "meta": {
          "userId": "USER_ID_HERE",
          "type": "PROGRAM",
          "itemId": "PROGRAM_ID_HERE"
        }
      }
    }
order: 6500
