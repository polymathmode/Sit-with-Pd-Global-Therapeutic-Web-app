$kind: http-request
description: Initializes a Paystack payment for a program purchase. Returns an
  authorizationUrl — redirect the user to this URL to complete payment.
url: "{{baseUrl}}/api/payments/initialize"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "PROGRAM",
      "itemId": "{{programId}}"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.reference) {
        pm.collectionVariables.set('paymentRef', res.data.reference);
        console.log('Payment ref saved:', res.data.reference);
        console.log('Redirect user to:', res.data.authorizationUrl);
      }
    language: text/javascript
order: 1000
