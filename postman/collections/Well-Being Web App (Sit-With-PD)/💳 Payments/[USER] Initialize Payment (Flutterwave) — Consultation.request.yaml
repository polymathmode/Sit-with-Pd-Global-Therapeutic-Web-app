$kind: http-request
name: "[USER] Initialize Payment (Flutterwave) — Consultation"
description: |-
  Flutterwave variant of the consultation initialize call. Useful for
  international clients paying for a session.

  Note: Cal.com → consultation auto-creates the payment using
  `CONSULTATION_PAYMENT_PROVIDER` env (PAYSTACK if unset). This endpoint is for
  manual / re-initialize flows.
url: "{{baseUrl}}/api/payments/initialize"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "CONSULTATION",
      "itemId": "{{consultationId}}",
      "provider": "FLUTTERWAVE",
      "currency": "USD"
    }
order: 3500
