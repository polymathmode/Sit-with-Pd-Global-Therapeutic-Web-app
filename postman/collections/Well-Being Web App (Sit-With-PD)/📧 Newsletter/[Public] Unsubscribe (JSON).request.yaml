$kind: http-request
description: |-
  Public. One-click unsub: `token` equals `newsletter_subscriptions.unsubscribeToken`.
  Defaults to redirect to CLIENT_URL (?newsletter=...). Use `?format=json` or Accept JSON for API response.
url: >-
  "{{baseUrl}}/api/newsletter/unsubscribe?token={{newsletterUnsubscribeToken}}&format=json"
method: GET
auth:
  type: noauth
headers:
  Accept: application/json
order: 2600
