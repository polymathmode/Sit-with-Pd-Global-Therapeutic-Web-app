$kind: http-request
description: |-
  Public. Stores email in `newsletter_subscriptions`, then creates/updates Resend Contact
  (and optional segments via RESEND_NEWSLETTER_SEGMENT_IDS) when RESEND_API_KEY is set.
  Rate limit ~30 requests / 15 min (separate from global API limit).
url: "{{baseUrl}}/api/newsletter/subscribe"
method: POST
auth:
  type: noauth
headers:
  Content-Type: application/json
body: |-
  {"email":"reader@example.com","source":"footer"}
order: 2500
