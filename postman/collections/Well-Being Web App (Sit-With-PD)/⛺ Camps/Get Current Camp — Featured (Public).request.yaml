$kind: http-request
description: >-
  Returns the next upcoming camp (earliest startDate, status UPCOMING) — use
  for the landing page hero. Same enriched shape as Get Camp by ID. Saves
  `campId` and first `campTierId` when present.
url: "{{baseUrl}}/api/camps/current"
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('campId', res.data.id);
        console.log('campId saved:', res.data.id);
      }
      if (res.data && res.data.tiers && res.data.tiers.length > 0) {
        pm.collectionVariables.set('campTierId', res.data.tiers[0].id);
        console.log('campTierId saved (first tier):', res.data.tiers[0].id);
      }
    language: text/javascript
order: 1500
