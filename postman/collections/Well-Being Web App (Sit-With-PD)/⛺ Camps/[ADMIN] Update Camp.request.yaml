$kind: http-request
description: "Admin only. Updates camp details. Status options: UPCOMING,
  ONGOING, COMPLETED, CANCELLED."
url: "{{baseUrl}}/api/camps/{{campId}}"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: status
      value: UPCOMING
      description: UPCOMING | ONGOING | COMPLETED | CANCELLED
    - type: text
      key: capacity
      value: "40"
order: 5000
