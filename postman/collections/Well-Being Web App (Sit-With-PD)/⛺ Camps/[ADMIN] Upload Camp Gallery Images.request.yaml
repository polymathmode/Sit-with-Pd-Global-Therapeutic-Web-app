$kind: http-request
description: >-
  Admin only. Multipart upload; field name `images` (repeat the field for
  multiple files, max 12). Optional parallel `captions` array (JSON string in
  form-data) aligns by index with each file.
url: "{{baseUrl}}/api/camps/{{campId}}/images"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: captions
      value: '["Group discussion","Journaling","Walking in nature","Calm conversations"]'
      description: Optional JSON array; one caption per image in upload order
    - type: file
      key: images
      src:
        - ""
      description: Add more rows with key `images` for additional photos
    - type: file
      key: images
      src:
        - ""
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.length && res.data[0].id) {
        pm.collectionVariables.set('campImageId', res.data[0].id);
        console.log('campImageId saved (first image):', res.data[0].id);
      }
    language: text/javascript
order: 7400
