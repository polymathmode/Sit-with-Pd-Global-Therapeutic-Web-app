$kind: http-request
description: >-
  Admin only. Creates a participation package (Individual / Couple / Family).
  `seatsPerUnit` is how many camp capacity seats one purchase consumes.
  `inclusions` matches the pricing card bullet list.
url: "{{baseUrl}}/api/camps/{{campId}}/tiers"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "label": "Individual",
      "description": "Single attendee",
      "price": 500,
      "inclusions": [
        "Accommodation",
        "Meals",
        "Guided sessions",
        "Community activities",
        "Reflection materials"
      ],
      "seatsPerUnit": 1,
      "maxUnits": null,
      "order": 0,
      "isFeatured": false
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('campTierId', res.data.id);
        console.log('campTierId saved:', res.data.id);
      }
    language: text/javascript
order: 7100
