$kind: http-request
description: Registers the logged-in user for a camp. After this, initialize
  payment using the returned registration ID.
url: "{{baseUrl}}/api/camps/{{campId}}/register"
method: POST
headers:
  Authorization: Bearer {{authToken}}
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('campRegistrationId', res.data.id);
        console.log('Camp Registration ID saved:', res.data.id);
      }
    language: text/javascript
order: 3000
