$kind: http-request
description: Admin only. Creates a new camp listing.
url: "{{baseUrl}}/api/camps"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Weekend Wellness Retreat
    - type: text
      key: description
      value: A transformative 3-day wellness retreat in nature.
    - type: text
      key: location
      value: Yankari Game Reserve, Bauchi
    - type: text
      key: price
      value: "75000"
    - type: text
      key: capacity
      value: "30"
    - type: text
      key: startDate
      value: 2026-05-01T08:00:00.000Z
    - type: text
      key: endDate
      value: 2026-05-03T17:00:00.000Z
    - type: file
      key: thumbnail
      src:
        - ""
      description: "Optional: camp thumbnail image"
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('campId', res.data.id);
        console.log('Camp ID saved:', res.data.id);
      }
    language: text/javascript
order: 4000
