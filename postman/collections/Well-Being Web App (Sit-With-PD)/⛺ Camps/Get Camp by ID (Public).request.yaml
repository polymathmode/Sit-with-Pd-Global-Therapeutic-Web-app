$kind: http-request
description: >-
  Returns full camp details including tiers (sole source of pricing for UIs —
  derive headlines such as “From ₦X” from min tier price), images, published
  testimonials, benefits, seatsTaken, and seatsRemaining. Legacy camp.price is
  omitted from the payload. After response, test script saves the first tier id
  to `campTierId` when tiers exist.
url: "{{baseUrl}}/api/camps/{{campId}}"
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.tiers && res.data.tiers.length > 0) {
        pm.collectionVariables.set('campTierId', res.data.tiers[0].id);
        console.log('campTierId saved (first tier):', res.data.tiers[0].id);
      }
    language: text/javascript
order: 2000
