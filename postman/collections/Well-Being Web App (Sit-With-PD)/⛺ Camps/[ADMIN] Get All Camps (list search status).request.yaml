$kind: http-request
description: >-
  Admin only. Paginated list of all camps. Optional search (title, location,
  description) and optional status=UPCOMING|ONGOING|COMPLETED|CANCELLED.
url: "{{baseUrl}}/api/camps/admin/all?page=1&limit=20&search="
method: GET
headers:
  Authorization: Bearer {{authToken}}
queryParams:
  page: "1"
  limit: "20"
  search: ""
  status: ""
order: 500
