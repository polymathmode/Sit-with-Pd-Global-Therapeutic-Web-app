method: PATCH
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "maintenanceMode": false,
      "allowUserRegistration": true,
      "requireEmailVerification": true,
      "autoEnrollment": false
    }
order: 2700
