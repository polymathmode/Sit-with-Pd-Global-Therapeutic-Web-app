$kind: http-request
description: >-
  Admin only. Paginated list of registered users with purchase/booking counts.
  Optional query `search` — substring match on firstName, lastName, or email
  (case-insensitive, max 100 chars).
url: "{{baseUrl}}/api/admin/users?page=1&limit=20&search="
method: GET
headers:
  Authorization: Bearer {{authToken}}
queryParams:
  page: "1"
  limit: "20"
  search: ""
order: 2000
