$kind: http-request
description: >-
  emailNotificationsEnabled (required). When false, sendMail skips outbound mail.
url: "{{baseUrl}}/api/admin/settings/notifications"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "emailNotificationsEnabled": true
    }
order: 2800
