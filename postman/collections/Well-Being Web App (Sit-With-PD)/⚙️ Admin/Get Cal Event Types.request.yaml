$kind: http-request
name: "[ADMIN] Get Cal.com event types"
description: >-
  Admin only. Proxies Cal.com GET /v2/event-types using CAL_API_KEY. Returns
  calEventTypeId, title, slug, lengthInMinutes, calBookingUrl, username for each
  event. Optional query: username=<cal-username> to scope results (see Cal API).
url: "{{baseUrl}}/api/admin/cal/event-types"
method: GET
headers:
  Authorization: Bearer {{authToken}}
order: 1500
