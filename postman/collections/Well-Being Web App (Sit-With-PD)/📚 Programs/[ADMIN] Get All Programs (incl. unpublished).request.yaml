$kind: http-request
description: |-
  Admin only. Paginated (`?page=`, `?limit=`).
  Optional `?search=` — substring on title/description (case-insensitive, max 100 chars).
  Optional `?category=` — LEADERS | STUDENTS | PROFESSIONALS.
  Returns all programs including drafts; includes week/purchase `_count`.
url: "{{baseUrl}}/api/programs/admin/all?page=1&limit=20"
method: GET
headers:
  Authorization: Bearer {{authToken}}
order: 3000
