$kind: http-request
name: "[ADMIN] Update Week"
description: Admin only. Updates a specific lesson.
url: "{{baseUrl}}/api/programs/:id/weeks/:weekId"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
pathVariables:
  id: ""
  weekId: ""
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Updated Lesson Title
    - type: text
      key: content
      value: Updated lesson content goes here...
order: 8000
