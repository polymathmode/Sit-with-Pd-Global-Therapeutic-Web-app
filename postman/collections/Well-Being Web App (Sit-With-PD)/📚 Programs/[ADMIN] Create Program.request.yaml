$kind: http-request
name: "[ADMIN] Create Program"
description: Admin only. Creates a new program. Use form-data to optionally
  attach a thumbnail image.
url: "{{baseUrl}}/api/programs"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Global Leadership Mastery hhh
      disabled: false
    - type: text
      key: description
      value: A 6-week intensive for future leadersgggggggg
      disabled: false
    - type: text
      key: price
      value: "5000"
      disabled: false
    - type: file
      key: thumbnail
      src: []
      description: "Optional: upload a thumbnail image"
      disabled: false
    - type: text
      key: hoursPerWeek
      value: "3"
      description: ""
      disabled: false
    - type: text
      key: learningOutcomes
      value: '["Active Listening", "Conflict Resolution"]'
      description: ""
      disabled: false
    - type: text
      key: facilitatorEmail
      value: nduulenu@gmail.com
      description: ""
      disabled: false
    - type: text
      key: startDate
      value: 2026-05-01
      description: ""
      disabled: false
    - type: text
      key: category
      value: LEADERS
      description: ""
      disabled: false
    - type: text
      key: facilitatorName
      value: Gobachev
      description: ""
      disabled: false
    - type: text
      key: weeks
      value: >
        [
          {
            "title": "Week 1: Foundations of Leadership",
            "description": "This week covers the basic philosophies of leadership.",
            "learningObjectives": ["Understand the 4 pillars", "Identify your style"],
            "modules": [
              {
                "title": "Introduction to Leadership Styles",
                "description": "Watch this brief overview.",
                "type": "VIDEO",
                "duration": "45 mins",
                "contentUrl": "https://www.youtube.com/watch?v=example"
              }
            ]
          },
          {
            "title": "Week 2: Advanced Strategies",
            "learningObjectives": ["Implement strategic planning"],
            "modules": [
              {
                "title": "Reading: Strategy Document",
                "type": "READING",
                "contentUrl": "https://docs.google.com/document/d/example"
              }
            ]
          }
        ]
      description: ""
      disabled: false
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('programId', res.data.id);
        console.log('Program ID saved:', res.data.id);
      }
    language: text/javascript
order: 4000
