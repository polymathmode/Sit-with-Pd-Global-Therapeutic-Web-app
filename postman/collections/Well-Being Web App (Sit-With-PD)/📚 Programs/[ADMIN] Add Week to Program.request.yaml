$kind: http-request
name: "[ADMIN] Add Week to Program"
description: Admin only. Adds a lesson to a program. Can include video upload
  and/or file upload.
url: "{{baseUrl}}/api/programs/cmnz2lf56000012xncpozqdtv/lessons"
method: POST
headers:
  - key: Authorization
    value: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Introduction to Leadershi
      disabled: false
    - type: text
      key: description
      value: What mindfulness is and why it matters.
      disabled: false
    - type: text
      key: content
      value: Welcome to lesson one. In this lesson we explore...
      disabled: false
    - type: text
      key: order
      value: "1"
      disabled: false
    - type: file
      key: video
      src: []
      description: ""
      disabled: false
    - type: file
      key: file
      src: []
      description: ""
      disabled: false
    - type: text
      key: learningObjectives
      value: '"Understand the core qualities of a leader", "Identify personal
        leadership style"'
      description: ""
      disabled: false
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('lessonId', res.data.id);
        console.log('Lesson ID saved:', res.data.id);
      }
    language: text/javascript
order: 7000
