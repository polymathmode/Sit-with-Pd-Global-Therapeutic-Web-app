$kind: http-request
description: Admin only. Adds a lesson to a program. Can include video upload
  and/or file upload.
url: "{{baseUrl}}/api/programs/{{programId}}/lessons"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: title
      value: Introduction to Mindfulness
    - type: text
      key: description
      value: What mindfulness is and why it matters.
    - type: text
      key: content
      value: Welcome to lesson one. In this lesson we explore...
    - type: text
      key: order
      value: "1"
    - type: file
      key: video
      src:
        - ""
      description: "Optional: upload a video file"
    - type: file
      key: file
      src:
        - ""
      description: "Optional: upload a PDF/document"
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('lessonId', res.data.id);
        console.log('Lesson ID saved:', res.data.id);
      }
    language: text/javascript
order: 7000
