$kind: http-request
description: >-
  Partial update (≥1 field). Allowed firstName, lastName, email, phone,
  timezone (IANA e.g. Africa/Lagos). null or "" clears phone/timezone.
  Email change resets verification and emails a verification link.
url: "{{baseUrl}}/api/auth/profile"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Tinu",
      "lastName": "Boroni",
      "phone": "+2348000000000",
      "timezone": "Africa/Lagos"
    }
order: 4020
