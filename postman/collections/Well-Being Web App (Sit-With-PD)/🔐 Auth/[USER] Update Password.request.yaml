$kind: http-request
description: >-
  Requires currentPassword + newPassword (≥8 chars). Accounts without a stored
  password (Google-only) cannot use this; use Forgot password instead.
url: "{{baseUrl}}/api/auth/password"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "Admin@1234",
      "newPassword": "NewPassword123"
    }
order: 4040
