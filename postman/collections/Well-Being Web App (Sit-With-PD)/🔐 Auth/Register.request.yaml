$kind: http-request
description: Create a new user account. Sends a verification email; token is
  saved to `authToken`. Response user includes `isEmailVerified` (false until
  verified).
url: "{{baseUrl}}/api/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "firstName": "John",
      "lastName": "Doe",
      "email": "john@example.com",
      "password": "Password123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.token) {
        pm.collectionVariables.set('authToken', res.data.token);
        console.log('Token saved:', res.data.token);
      }
    language: text/javascript
order: 1000
