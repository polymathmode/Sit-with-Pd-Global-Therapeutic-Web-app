$kind: http-request
description: >-
  Partial PATCH — include at least one boolean notifyEmail, notifyProgramReminders,
  notifyPush. Defaults for new accounts email=true, reminders=false, push=true.
url: "{{baseUrl}}/api/auth/notifications"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "notifyEmail": true,
      "notifyProgramReminders": false,
      "notifyPush": true
    }
order: 4060
