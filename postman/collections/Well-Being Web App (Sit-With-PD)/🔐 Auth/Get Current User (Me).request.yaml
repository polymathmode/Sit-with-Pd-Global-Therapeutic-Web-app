$kind: http-request
description:
  >-
  Returns id, names, email, role, isEmailVerified, createdAt; Settings —
  phone, timezone, notifyEmail, notifyProgramReminders, notifyPush,
  hasPassword (false if OAuth-only).
url: "{{baseUrl}}/api/auth/me"
method: GET
headers:
  Authorization: Bearer {{authToken}}
order: 4000
