$kind: http-request
name: Login
description: Login with existing credentials. Use admin@wellbeing.com / Admin@1234 for the seeded admin account. Test script saves `authToken` and `userId` from `data.user.id` when present.
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@wellbeing.com",
      "password": "Admin@1234"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.token) {
        pm.collectionVariables.set('authToken', res.data.token);
        if (res.data.user && res.data.user.id) {
          pm.collectionVariables.set('userId', res.data.user.id);
        }
        console.log('Token saved:', res.data.token);
      }
    language: text/javascript
order: 2000
