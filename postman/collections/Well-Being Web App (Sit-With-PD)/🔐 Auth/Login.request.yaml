$kind: http-request
description: Login with existing credentials. Use admin@wellbeing.com /
  Admin@1234 for the seeded admin account.
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@wellbeing.com",
      "password": "Admin@1234"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.token) {
        pm.collectionVariables.set('authToken', res.data.token);
        console.log('Token saved:', res.data.token);
      }
    language: text/javascript
order: 2000
