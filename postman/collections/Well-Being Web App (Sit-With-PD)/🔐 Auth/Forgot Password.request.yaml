$kind: http-request
description: Sends a password reset link to the provided email. Always returns
  200 to prevent email enumeration.
url: "{{baseUrl}}/api/auth/forgot-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "john@example.com"
    }
auth:
  type: noauth
order: 7000
