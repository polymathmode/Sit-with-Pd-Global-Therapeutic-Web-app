$kind: http-request
name: Google Sign-In
description: Send the Google ID token (JWT) from Google Identity Services or the
  mobile SDK. Set `GOOGLE_CLIENT_ID` in server `.env` to your OAuth Web Client
  ID. Same response shape as Login.
url: "{{baseUrl}}/api/auth/google"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "idToken": "eyJhbGciOiJSUzI1NiIsImtpZCI6ImNjZTRlMDI0YTUxYWEwYzFjNDFjMWE0NTE1YTQxZGQ3ZTk2MTkzNmIiLCJ0eXAiOiJKV1QifQ..aBuqB8gx8dktmyeNWL_sEDBLsukDa7xZOQA1nj4OPCQ0pRrnTG0I2era9fNmDQfFb5QcAZnb1CbHhvXsOweOpsUxvPzWt1f5Ipo0YW4-ZUJL8V05reV7bZczcxD2rHv7ou_karGKBlttAatkH4mQ9d0XzpKQv0JrZMUP4LtLFM4WT_qomI34VlaJY82TNk8YLbKDgYnUqWdl3MwFnu044EtP0FNnP7TB_drcNiaDyVc-NyBMUMETfTkjVaX3Bso7Yb_9B66yELsEWsVUm8yQYlPSpu6ifXWqLzZkEIui70gJedICn8bp2v--sfTPUskZaniBCLsK0PaAqAAZjiQjTA"
