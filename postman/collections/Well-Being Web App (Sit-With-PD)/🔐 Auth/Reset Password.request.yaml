$kind: http-request
description: Reset the password using the token from the reset email. Token
  expires in 15 minutes.
url: "{{baseUrl}}/api/auth/reset-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "token": "PASTE_RESET_TOKEN_FROM_EMAIL_HERE",
      "password": "NewPassword123"
    }
auth:
  type: noauth
order: 8000
