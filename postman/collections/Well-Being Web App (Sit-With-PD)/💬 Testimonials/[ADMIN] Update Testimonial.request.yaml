$kind: http-request
description: >-
  Admin only. Multipart PATCH — include only fields to change. New `avatar`
  file replaces `avatarUrl` when provided.
url: "{{baseUrl}}/api/testimonials/{{testimonialId}}"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: quote
      value: Updated quote text after editing.
    - type: text
      key: isPublished
      value: "true"
    - type: file
      key: avatar
      src:
        - ""
      description: Optional — omit row if not changing photo
order: 5000
