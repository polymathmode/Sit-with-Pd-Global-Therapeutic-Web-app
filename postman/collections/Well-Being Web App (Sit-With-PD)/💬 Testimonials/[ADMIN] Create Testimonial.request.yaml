$kind: http-request
description: >-
  Admin only. Multipart: text fields plus optional `avatar` image. Leave
  `campId` empty for a global testimonial, or set to `{{campId}}` to attach to
  a camp page.
url: "{{baseUrl}}/api/testimonials"
method: POST
headers:
  Authorization: Bearer {{authToken}}
body:
  type: formdata
  content:
    - type: text
      key: campId
      value: "{{campId}}"
      description: Optional — leave blank or delete value for site-wide
    - type: text
      key: name
      value: Ifeoma
    - type: text
      key: role
      value: Camp Participant
    - type: text
      key: quote
      value: A transformative experience — I left with real clarity and peace.
    - type: text
      key: isPublished
      value: "true"
    - type: text
      key: order
      value: "0"
    - type: file
      key: avatar
      src:
        - ""
      description: Optional headshot — JPG/PNG/WebP
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('testimonialId', res.data.id);
        console.log('testimonialId saved:', res.data.id);
      }
    language: text/javascript
order: 4000
