$kind: http-request
description: Books a consultation for the logged-in user. After this, initialize
  payment using the returned consultation ID.
url: "{{baseUrl}}/api/consultations/book"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "serviceId": "{{serviceId}}",
      "preferredDate": "2026-04-15T10:00:00.000Z",
      "notes": "I'd like to focus on stress management and work-life balance."
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('consultationId', res.data.id);
        console.log('Consultation ID saved:', res.data.id);
      }
    language: text/javascript
order: 3000
