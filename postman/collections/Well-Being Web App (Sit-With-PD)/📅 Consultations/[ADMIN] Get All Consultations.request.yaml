$kind: http-request
description: |-
  Admin only. Paginated list of all consultation bookings (`?page=`, `?limit=`).
  Optional `?search=` — substring match on booked user's first name, last name,
  email and consultation service title (case-insensitive, max 100 chars).
  Optional `?status=` — PENDING | PENDING_PAYMENT | CONFIRMED | CANCELLED | COMPLETED.
url: "{{baseUrl}}/api/consultations?page=1&limit=20"
method: GET
headers:
  Authorization: Bearer {{authToken}}
order: 5000
