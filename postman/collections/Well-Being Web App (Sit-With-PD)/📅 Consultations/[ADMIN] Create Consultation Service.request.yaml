$kind: http-request
name: "[ADMIN] Create Consultation Service"
description: Admin only. Creates a new consultation service offering.
url: "{{baseUrl}}/api/consultations/services"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Personal Wellness Consultation",
      "description": "A 60-minute one-on-one session focused on your personal wellness journey.",
      "price": 15000,
      "duration": 60,
      "calEventTypeId": 5230076
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.id) {
        pm.collectionVariables.set('serviceId', res.data.id);
        console.log('Service ID saved:', res.data.id);
      }
    language: text/javascript
order: 7000
