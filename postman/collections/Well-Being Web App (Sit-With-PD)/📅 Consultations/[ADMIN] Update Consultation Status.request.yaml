$kind: http-request
description: "Admin only. Updates consultation status. Options: PENDING,
  CONFIRMED, CANCELLED, COMPLETED."
url: "{{baseUrl}}/api/consultations/{{consultationId}}"
method: PATCH
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "status": "CONFIRMED",
      "confirmedDate": "2026-04-15T10:00:00.000Z"
    }
order: 6000
