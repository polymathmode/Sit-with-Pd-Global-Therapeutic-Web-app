$kind: http-request
description: >-
  Sends email to platform supportEmail (admin Settings). Requires verified email
  when requireEmailVerification is on. Body: message (required, 10–4000 chars),
  subject optional (max 200). Reply-To is the user's email.
url: "{{baseUrl}}/api/dashboard/support/contact"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "subject": "Question about my account",
      "message": "Hello, I need help with resetting my dashboard progress view. Thanks."
    }
order: 3100
