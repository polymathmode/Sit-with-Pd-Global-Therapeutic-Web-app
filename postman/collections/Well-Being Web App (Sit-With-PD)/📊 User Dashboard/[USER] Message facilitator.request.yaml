$kind: http-request
description: >-
  Email to programme facilitator (Program.facilitatorEmail). User must have a
  successful purchase for programId. 400 if facilitator email not configured.
url: "{{baseUrl}}/api/dashboard/programs/{{programId}}/contact-facilitator"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "subject": "Week 3 module question",
      "message": "Hi, could you clarify the assignment due date for Communication & Influence? Thank you."
    }
order: 3200
