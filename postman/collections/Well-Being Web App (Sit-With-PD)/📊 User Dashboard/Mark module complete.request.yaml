$kind: http-request
description: |-
  Called by the frontend when the learner completes a module (video progress, quiz, etc.).
  Idempotent POST. Response body is ProgrammeProgressOverview (same shape as dashboard `purchase.progress`).
url: >-
  "{{baseUrl}}/api/dashboard/programs/{{programId}}/modules/{{programModuleId}}/complete"
method: POST
headers:
  Authorization: Bearer {{authToken}}
order: 2100
