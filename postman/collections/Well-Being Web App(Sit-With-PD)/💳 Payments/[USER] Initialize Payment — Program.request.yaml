$kind: http-request
description: |-
  Initializes a payment for a program purchase. Returns an authorizationUrl —
  redirect the user to this URL to complete payment.

  Optional body fields:
  - `provider` — "PAYSTACK" (default) or "FLUTTERWAVE".
  - `currency` — ISO code (e.g. "NGN", "USD", "GBP"). Defaults to server's
    `PAYMENT_DEFAULT_CURRENCY` (NGN). Use a non-NGN currency with Flutterwave
    for international cards.

  Response includes `provider`, `currency`, `authorizationUrl`, and `reference`.
url: "{{baseUrl}}/api/payments/initialize"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "PROGRAM",
      "itemId": "{{programId}}",
      "provider": "PAYSTACK",
      "currency": "NGN"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.reference) {
        pm.collectionVariables.set('paymentRef', res.data.reference);
        console.log('Payment ref saved:', res.data.reference);
        console.log('Redirect user to:', res.data.authorizationUrl);
      }
    language: text/javascript
order: 1000
