$kind: http-request
description: |-
  Initializes a payment for a camp registration. `itemId` must be the
  registration ID (not the camp ID).

  Optional body fields:
  - `provider` — "PAYSTACK" (default) or "FLUTTERWAVE".
  - `currency` — ISO code (e.g. "NGN", "USD"). Defaults to NGN.
url: "{{baseUrl}}/api/payments/initialize"
method: POST
headers:
  Authorization: Bearer {{authToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "CAMP",
      "itemId": "{{campRegistrationId}}",
      "provider": "PAYSTACK",
      "currency": "NGN"
    }
order: 2000
